# Backend-only stack: Qdrant + LangGraph backend.
#
#   cp backend/.env.example backend/.env
#   docker compose up --build
#
#   LangGraph: http://localhost:2024
#   Qdrant:    http://localhost:6333/dashboard
#
# The Qdrant collection starts empty. Populate it once with:
#   docker compose run --rm backend uv run python run_full_indexing.py
# after placing the local corpus under ./data, which is mounted to /data.

services:
  qdrant:
    image: qdrant/qdrant:v1.16.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      - qdrant
    env_file:
      - backend/.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      DATA_DIR: /data
      HF_HOME: /cache/huggingface
    volumes:
      - ./backend/.env:/app/backend/.env:ro
      - ./data:/data
      - hf_cache:/cache/huggingface
      - langgraph_state:/app/.langgraph_api
    ports:
      - "2024:2024"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
  langgraph_state:
